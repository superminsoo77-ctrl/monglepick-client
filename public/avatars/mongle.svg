<?xml version="1.0" encoding="UTF-8"?>
<!--
  몽글이 프로필 아바타 (실제 로고 캐릭터).
  /public/mongle-transparent.png(2048x2048, 2.4MB) 을 256x256 + 128색 양자화 PNG 로 다운샘플
  (~10KB) 후 base64 로 임베드. 정적 자산 한 파일에서 자족하도록 SVG 래퍼만 유지.
  - viewBox 200x200 고정 → 다른 아바타 (clapperboard/film_reel/popcorn_box/star_critic) 와 동일 비율
  - PointItemInitializer 가 .png imageUrl 을 강제로 .svg 로 재작성하므로(line 306) URL 은 .svg 유지
  - 디자인 교체 시 256x256 PNG 만 재생성해 base64 부분만 바꾸면 됨
-->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 200 200" width="200" height="200">
  <image href="data:image/png;base64," x="0" y="0" width="200" height="200" preserveAspectRatio="xMidYMid meet" />
</svg>
