<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/monglepick-favicon.svg" />
    <!--
      viewport-fit=cover : iOS 노치 / Android 시스템 UI 영역까지 페이지가 확장되도록 허용.
      이렇게 해야 CSS 의 env(safe-area-inset-*) 변수가 실제 값을 갖는다.
      모바일 햄버거 메뉴(position: fixed) 가 홈 인디케이터/노치에 잘리지 않도록 하기 위해 필수.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>몽글픽 — AI 영화 추천 플랫폼</title>
    <!-- Google Fonts: 랜딩 페이지용 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <!-- FOUC(깜빡임) 방지: React 마운트 전에 테마 모드를 결정하여 적용 -->
    <script>
      (function() {
        var saved = localStorage.getItem('monglepick_theme_mode');
        var mode = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', mode);
        document.documentElement.style.colorScheme = mode;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
