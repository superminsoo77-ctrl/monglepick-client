# =========================================
# 몽글픽 React 클라이언트 CI/CD 워크플로우
# =========================================
# PR/push → npm build + ESLint (GitHub 호스팅 러너)
# develop push → 스테이징 맥북에서 빌드 후 Nginx 리로드 (Self-hosted 러너)
#
# 사전 준비:
#   스테이징 맥북에 GitHub Actions self-hosted runner 설치 완료
#   스테이징 맥북에 Node.js 20+ 설치 필요

name: CI/CD

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── CI: 빌드 + 린트 (GitHub 호스팅 러너) ───
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ─── CD: 스테이징 배포 (Self-hosted 러너에서 직접 실행) ───
  deploy:
    name: Deploy to Staging
    needs: build
    runs-on: self-hosted
    timeout-minutes: 10
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Client + Nginx reload
        run: |
          set -e
          echo "========== Client 배포 시작 =========="

          PROJECT_DIR="${PROJECT_DIR:-/Users/yoonhyungjoo/Documents/monglepick}"

          # checkout된 코드를 프로젝트 디렉토리에 동기화
          rsync -a --delete --exclude='node_modules' --exclude='dist' --exclude='.env' \
            "$GITHUB_WORKSPACE/" "$PROJECT_DIR/monglepick-client/"

          cd "$PROJECT_DIR/monglepick-client"

          # 의존성 설치 + React 빌드 (dist/가 Nginx 볼륨 마운트)
          echo ">>> React 빌드..."
          npm install
          npm run build

          cd "$PROJECT_DIR"

          # Nginx 리로드 (dist/ 볼륨 마운트이므로 리로드만)
          echo ">>> Nginx 리로드..."
          docker exec staging-nginx nginx -s reload 2>/dev/null || \
            docker compose -f docker-compose.staging.yml restart nginx

          # 헬스체크
          if curl -sf "http://localhost/health" > /dev/null 2>&1; then
            echo "  ✅ Nginx OK"
          else
            echo "  ❌ Nginx health check failed"
          fi

          echo "========== ✅ Client 배포 완료 =========="
