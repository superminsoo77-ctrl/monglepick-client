# =========================================
# 몽글픽 React 클라이언트 CI/CD 워크플로우
# =========================================
# PR/push → npm build + ESLint (GitHub 호스팅 러너)
# develop push → 스테이징 맥북에서 빌드 후 Nginx 리로드 (Self-hosted 러너)
#
# 사전 준비:
#   스테이징 맥북에 GitHub Actions self-hosted runner 설치 완료
#   스테이징 맥북에 Node.js 20+ 설치 필요

name: CI/CD

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── CI: 빌드 + 린트 (GitHub 호스팅 러너) ───
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ─── CD: 스테이징 배포 (Self-hosted 러너에서 직접 실행) ───
  deploy:
    name: Deploy to Staging
    needs: build
    runs-on: self-hosted
    timeout-minutes: 10
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Client + Nginx rebuild
        run: |
          set -e
          echo "========== Client 배포 시작 =========="

          # 스테이징 맥북 프로젝트 경로 (Runner 환경변수 또는 기본값)
          PROJECT_DIR="${PROJECT_DIR:-$HOME/Documents/monglepick}"

          # checkout된 코드를 프로젝트 디렉토리에 동기화
          rsync -a --delete --exclude='node_modules' --exclude='dist' --exclude='.env' \
            "$GITHUB_WORKSPACE/" "$PROJECT_DIR/monglepick-client/"

          cd "$PROJECT_DIR"

          # Nginx 컨테이너 재빌드 (내부에서 React 빌드 + Nginx 서빙)
          echo ">>> Nginx + Client 재빌드..."
          docker compose -f Staging/docker-compose.app.yml --env-file Staging/.env.staging \
            up -d --build --no-deps nginx

          # 헬스체크
          echo ">>> Nginx 헬스체크 대기..."
          for i in 1 2 3 4 5 6; do
            if curl -sf "http://localhost/health" > /dev/null 2>&1; then
              echo "  ✅ Nginx OK"
              break
            fi
            echo "  ⏳ Nginx starting... ($i/6)"
            sleep 5
          done

          echo "========== ✅ Client 배포 완료 =========="
